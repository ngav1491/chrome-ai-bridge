name: Build and Release chrome-ai-bridge

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA). Defaults to the current default branch.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-extension:
    name: Build Chrome extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build the extension
        run: pnpm build:extension

      - name: Zip the extension output
        run: |
          mkdir -p release-artifacts
          cd app/chrome-extension/.output
          # WXT 0.20+ produces a single zip per build target.
          ZIP_FILE=$(ls -1 chrome-mv3*.zip | head -n 1)
          if [ -z "$ZIP_FILE" ]; then
            echo "No zip found in app/chrome-extension/.output" >&2
            exit 1
          fi
          cp "$ZIP_FILE" ../../release-artifacts/chrome-ai-bridge-extension.zip
          cd ../..
          sha256sum release-artifacts/chrome-ai-bridge-extension.zip | tee release-artifacts/chrome-ai-bridge-extension.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chrome-ai-bridge-extension-zip
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: build-extension
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-ai-bridge-extension-zip
          path: release-artifacts/

      - name: Verify checksums
        run: |
          cd release-artifacts
          sha256sum -c chrome-ai-bridge-extension.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'chrome-ai-bridge ${{ github.ref_name }}'
          generate_release_notes: true
          files: |
            release-artifacts/chrome-ai-bridge-extension.zip
            release-artifacts/chrome-ai-bridge-extension.sha256
