name: Build and Release chrome-ai-bridge

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      ref:
        description: 'Git ref to build (branch, tag, or SHA). Defaults to the current default branch.'
        required: false
        default: ''

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-extension:
    name: Build Chrome extension
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        # Skip postinstall on the first install so the native-server dist
        # is not required to exist yet.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build shared + native-server
        run: pnpm build:shared && pnpm build:native

      - name: Re-run postinstall hooks with dist/ in place
        run: pnpm rebuild

      - name: Build the extension
        run: pnpm build:extension

      - name: Zip the extension output
        run: |
          mkdir -p release-artifacts
          # pnpm build runs wxt build, copy-static-assets, and make-release-zip
          # (which packages .output/chrome-mv3 into a single zip for unpacked install).
          if [ ! -f app/chrome-extension/.output/chrome-ai-bridge-extension.zip ]; then
            echo "Release zip not found at app/chrome-extension/.output/chrome-ai-bridge-extension.zip" >&2
            exit 1
          fi
          cp app/chrome-extension/.output/chrome-ai-bridge-extension.zip release-artifacts/chrome-ai-bridge-extension.zip
          sha256sum release-artifacts/chrome-ai-bridge-extension.zip | tee release-artifacts/chrome-ai-bridge-extension.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: chrome-ai-bridge-extension-zip
          path: release-artifacts/
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub release
    needs: build-extension
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: chrome-ai-bridge-extension-zip
          path: release-artifacts/

      - name: Verify checksums
        run: |
          # download-artifact extracts the artifact zip into the target dir,
          # so we expect chrome-ai-bridge-extension.{zip,sha256} directly under
          # release-artifacts/. List files first to surface path mismatches
          # clearly if the download layout changes.
          ls -la release-artifacts/
          if [ ! -f release-artifacts/chrome-ai-bridge-extension.zip ]; then
            echo "Missing release-artifacts/chrome-ai-bridge-extension.zip" >&2
            find release-artifacts -type f
            exit 1
          fi
          if [ ! -f release-artifacts/chrome-ai-bridge-extension.sha256 ]; then
            echo "Missing release-artifacts/chrome-ai-bridge-extension.sha256" >&2
            find release-artifacts -type f
            exit 1
          fi
          sha256sum -c release-artifacts/chrome-ai-bridge-extension.sha256

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: 'chrome-ai-bridge ${{ github.ref_name }}'
          generate_release_notes: true
          files: |
            release-artifacts/chrome-ai-bridge-extension.zip
            release-artifacts/chrome-ai-bridge-extension.sha256
