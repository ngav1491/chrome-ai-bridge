name: CI

on:
  push:
    branches: [master, develop]
  pull_request:
    branches: [master, develop]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        # --ignore-scripts prevents the native-server postinstall hook from
        # running before its own dist/ has been built.
        run: pnpm install --frozen-lockfile --ignore-scripts

      - name: Build the workspaces that ship a dist (needed by postinstall)
        run: pnpm build:shared && pnpm build:native

      - name: Re-run postinstall hooks with dist/ in place
        run: pnpm rebuild

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build all workspaces
        run: pnpm build
